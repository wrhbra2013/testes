<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="robots" content="noindex, nofollow" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"
        />
        <title>CodeTrain - Plataforma de Treinamento em Programação</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="static/css/training.css" />
    </head>
    <body>
        <iframe id="sandbox-iframe" sandbox="allow-scripts" style="display: none"></iframe>

        <header class="header">
            <div class="logo" data-page="dashboard">
                <span>💻</span>
                <span>CodeTrain</span>
            </div>
            <div id="header-actions" class="user-info hidden">
                <span id="user-name">Usuário</span>
                <div class="user-avatar" id="user-avatar">U</div>
                <button class="btn btn-outline btn-sm" id="logout-btn">Sair</button>
            </div>
        </header>

        <nav class="nav-tabs hidden" id="nav-tabs">
            <button class="nav-tab active" data-page="dashboard">📊 Dashboard</button>
            <button class="nav-tab" data-page="exercises">📝 Exercícios</button>
            <button class="nav-tab" data-page="progress">📈 Progresso</button>
        </nav>

        <main class="main">
            <!-- LOGIN PAGE -->
            <section class="page" id="page-login">
                <div class="login-wrapper">
                    <div class="login-card">
                        <div class="login-icon">🚀</div>
                        <h1>CodeTrain</h1>
                        <p class="login-subtitle">Plataforma de Treinamento em Programação</p>

                        <form id="login-form">
                            <div class="form-group">
                                <label for="login-name">Seu Nome</label>
                                <input
                                    type="text"
                                    id="login-name"
                                    placeholder="Digite seu nome"
                                    required
                                    autocomplete="off"
                                />
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">
                                Começar a Treinar
                            </button>
                        </form>

                        <div class="login-features">
                            <span>🐍 Python</span>
                            <span>⚡ JavaScript</span>
                            <span>☕ Java</span>
                            <span>⚙️ C++</span>
                            <span>🔵 Go</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- DASHBOARD PAGE -->
            <section class="page hidden" id="page-dashboard">
                <div class="stats-grid" id="dashboard-stats"></div>

                <div class="card">
                    <h3 class="section-title">📚 Escolha uma Linguagem</h3>
                    <div class="language-grid" id="dashboard-languages"></div>
                </div>

                <div class="card">
                    <h3 class="section-title">🕐 Atividade Recente</h3>
                    <div class="activity-list" id="activity-list"></div>
                </div>
            </section>

            <!-- EXERCISES PAGE -->
            <section class="page hidden" id="page-exercises">
                <button class="back-btn" id="btn-back">← Voltar às Linguagens</button>

                <div class="exercises-layout" id="exercises-container">
                    <div class="card exercises-list-card">
                        <div class="exercise-list" id="exercise-list"></div>
                    </div>

                    <div class="exercise-editor hidden" id="exercise-editor">
                        <div class="editor-header">
                            <div class="editor-title">
                                <span id="exercise-title">Exercício</span>
                                <span id="language-badge" class="language-badge"></span>
                                <span id="exercise-difficulty" class="exercise-difficulty"></span>
                            </div>
                            <div class="editor-actions">
                                <button class="btn btn-outline btn-sm" id="btn-show-solution">
                                    👁️ Solução
                                </button>
                                <button class="btn btn-success btn-sm" id="btn-mark-complete">
                                    ✓ Concluir
                                </button>
                                <button
                                    class="btn btn-sm expand-btn"
                                    id="expand-fullscreen"
                                    title="Tela Cheia"
                                >
                                    <svg
                                        width="16"
                                        height="16"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                    >
                                        <path
                                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
                                        />
                                    </svg>
                                    <span>Tela Cheia</span>
                                </button>
                            </div>
                        </div>
                        <p class="exercise-desc" id="exercise-desc"></p>
                        <div class="editor-content">
                            <div class="code-panel">
                                <textarea
                                    id="code-editor"
                                    class="code-editor"
                                    spellcheck="false"
                                    autocomplete="off"
                                    autocorrect="off"
                                    autocapitalize="off"
                                ></textarea>
                            </div>
                            <div class="output-panel">
                                <div class="output-label">SAÍDA:</div>
                                <div id="output" class="output-content">
                                    Execute o código para ver o resultado...
                                </div>
                            </div>
                        </div>
                        <div class="code-output">
                            <span class="language-badge" id="language-badge-2"></span>
                            <button class="btn btn-primary" id="btn-run">▶️ Executar</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- PROGRESS PAGE -->
            <section class="page hidden" id="page-progress">
                <div class="card" id="progress-chart"></div>
                <div class="card" style="margin-top: 24px">
                    <div id="progress-achievements"></div>
                </div>
            </section>
        </main>

        <!-- Fullscreen Editor -->
        <div class="fullscreen-overlay hidden" id="fullscreen-container">
            <div class="fullscreen-editor">
                <div class="editor-header">
                    <div class="editor-title">
                        <span id="fs-exercise-title"></span>
                        <span class="language-badge" id="fs-language-badge"></span>
                        <span class="exercise-difficulty" id="fs-exercise-difficulty"></span>
                    </div>
                    <div class="editor-actions">
                        <button class="btn btn-outline btn-sm" id="btn-solution-fullscreen">
                            👁️ Solução
                        </button>
                        <button class="btn btn-success btn-sm" id="btn-complete-fullscreen">
                            ✓ Concluir
                        </button>
                    </div>
                </div>
                <p class="exercise-desc" id="fs-exercise-desc"></p>
                <div class="editor-body">
                    <div class="code-panel">
                        <textarea
                            id="fs-code-editor"
                            class="code-editor"
                            spellcheck="false"
                            autocomplete="off"
                            autocorrect="off"
                            autocapitalize="off"
                        ></textarea>
                    </div>
                    <div class="output-section">
                        <div class="output-header">
                            <span>📤 Saída</span>
                            <button class="btn btn-primary btn-sm" id="btn-run-fullscreen">
                                ▶️ Executar (Ctrl+Enter)
                            </button>
                        </div>
                        <div id="output-fullscreen" class="output-content">
                            Execute o código para ver o resultado...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="exit-fullscreen-btn hidden" id="exit-fullscreen-btn">
            <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
            >
                <path d="M18 6L6 18M6 6l12 12" />
            </svg>
            Sair da Tela Cheia
        </button>

        <script src="static/js/training.js"></script>
    </body>
</html>
